<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>

  <!-- Header -->

  <section class="hero-carousel" id="hero-carousel">

  </section>

    </div>

  <!-- Top Rated -->
  <section class="section fade-in">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">⭐ Top Rating Sepanjang Masa</h2>
        <a href="top.html" class="section-link">Lihat Semua →</a>
