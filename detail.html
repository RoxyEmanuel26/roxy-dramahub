<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail — DramaHub</title>
  <meta name="description" content="Informasi lengkap drama Korea di DramaHub.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e50914'/><polygon points='11,7 11,25 25,16' fill='white'/></svg>">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="header-slot"></div>

  <!-- Detail Hero -->
  <section class="detail-hero">
    <div class="detail-hero-bg"></div>
    <div class="detail-hero-gradient"></div>
    <div class="detail-hero-inner">
      <!-- Filled dynamically by JS -->
      <div style="display:flex;gap:48px;width:100%;">
        <div class="skeleton" style="width:280px;height:420px;flex-shrink:0;border-radius:12px"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:16px;padding-top:24px">
          <div class="skeleton" style="width:120px;height:28px;border-radius:4px"></div>
          <div class="skeleton" style="width:80%;height:36px;border-radius:4px"></div>
          <div class="skeleton" style="width:60%;height:20px;border-radius:4px"></div>
          <div class="skeleton" style="width:40%;height:20px;border-radius:4px"></div>
          <div class="skeleton" style="width:100%;height:80px;border-radius:4px"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Tab Content -->
  <div id="detail-tab-content"></div>

  <!-- Recommendations -->
  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Mungkin Kamu Suka</h2>
      </div>
      <div class="carousel-row" id="detail-recommendations"></div>
    </div>
  </section>

  <!-- Similar -->
  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Drama Serupa</h2>
      </div>
      <div class="carousel-row" id="detail-similar"></div>
    </div>
  </section>

  <div id="footer-slot"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
