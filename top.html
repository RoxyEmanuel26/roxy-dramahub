<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Drama & Movie Korea — DramaHub</title>
  <meta name="description" content="Top 100 drama dan movie Korea dengan rating tertinggi sepanjang masa.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e50914'/><polygon points='11,7 11,25 25,16' fill='white'/></svg>">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div id="header-slot"></div>

  <!-- Hero -->
  <div class="top-hero">
    <div class="container">
      <h1>🏆 Top Drama & Movie Korea</h1>
    </div>
  </div>

  <div class="container" style="padding-top:var(--space-xl);padding-bottom:var(--space-3xl)">

    <!-- Tabs -->
    <div class="top-tabs">
      <div class="tabs" style="border:none;justify-content:center">
        <button class="tab-btn top-tab-btn active" data-type="tv">Top TV Drama</button>
        <button class="tab-btn top-tab-btn" data-type="movie">Top Movie</button>
      </div>
    </div>

    <!-- Rank List -->
    <div class="rank-list" id="top-list"></div>

    <!-- Load More -->
    <div class="load-more-wrap">
      <button class="btn btn-outline" id="load-more-btn">Muat 20 Lagi ↓</button>
    </div>
  </div>

  <div id="footer-slot"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
